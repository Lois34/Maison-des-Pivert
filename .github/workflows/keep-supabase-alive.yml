name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          # Ping push_subscriptions (pas de RLS, toujours accessible)
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/push_subscriptions?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Ping Supabase OK"
